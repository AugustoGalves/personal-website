<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em manutenção</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1d3557; /* Azul marinho padrão */
            --accent: #025bb0;  /* Cor de destaque dos botões */
            --accent-hover: #02478a; /* Hover do botão principal */
            --text: #333333;
            --text-muted: #666666;
            --bg: #f8f9fa;
        }

        /* Suporte ao Dark Mode do sistema */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --text: #f1f5f9;
                --text-muted: #cbd5e1;
                --accent: #3b82f6; /* Azul mais claro para destacar no escuro */
                --accent-hover: #60a5fa;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        .container { 
            max-width: 600px; 
            padding: 40px 20px;
        }

        /* Animação de Engrenagem (Engineering Coded) */
        .icon-wrapper {
            margin-bottom: 25px;
            animation: rotate 8s linear infinite;
            display: inline-block;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border: 1.5px solid var(--accent);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: var(--text);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 35px;
        }

        /* Botão de Voltar */
        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            background-color: var(--accent);
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-back:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            color: #ffffff;
        }

        .contact-links {
            margin-top: 50px;
            font-size: 0.95rem;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .contact-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .contact-links a:hover {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
            .btn-back { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">
            <svg width="80" height="80" viewBox="0 -960 960 960" fill="currentColor" style="color: var(--accent);">
                <path d="M150-103v-128h144l-93-317q-45-14-71.5-47.5T103-684q0-56 41-97.5t97-41.5q53 0 89 29t49 80h109v-59q0-17 12-29t29-12q10 0 17.5 7t8.5 17l68-65q11-10 26.5-13.5T681-865l158 76q14 7 19 21t-3 29q-7 13-21 17t-27-4l-147-72-89 90v42l89 95 147-71q15-7 27.5-4t20.5 16q8 15 3 30t-20 22l-150 71q-19 10-35.5 9T623-512l-68-65q-1 14-8 19t-18 5q-17 0-29-12t-12-29v-60H377q-2 17-12.5 38.5T342-586l183 355h184v128H150Zm91-525q24 0 40-16t16-40q0-24-16-40t-40-16q-24 0-40 16t-16 40q0 24 16 40t40 16Zm120 397h97L289-562q-5 3-12.5 5.5T265-553l96 322Zm97 0Z"/>
            </svg>
        </div>

        <div class="badge">Ajuste Técnico</div>
        
        <h1>Calibrando Sistemas</h1>
        
        <p>Estamos realizando uma manutenção nesta página para atualização. Voltamos em breve com novidades.</p>

        <a onclick="goBack()" class="btn-back">
            <i class="fas fa-arrow-left"></i> Voltar à página anterior
        </a>

        <div class="contact-links">
            <a href="mailto:augusto@augustogalves.com"><i class="fas fa-envelope"></i> E-mail</a>
            <a href="https://linkedin.com/in/AugustoGalves" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i> LinkedIn</a>
        </div>
    </div>

    <script>
        function goBack() {
            // Se o usuário tem histórico de navegação na aba, volta. Se não, joga pra Home (/)
            if (window.history.length > 1 && document.referrer !== "") {
                window.history.back();
            } else {
                window.location.href = '/'; 
            }
        }
    </script>
</body>
</html>
